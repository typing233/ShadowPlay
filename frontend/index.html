<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowPlay - 人格复刻与思想对撞沙盒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        
        @keyframes blink {
            50% { border-color: transparent }
        }
        
        .typing-indicator::after {
            content: '|';
            animation: blink 1s step-end infinite;
        }
        
        .message-appear {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .character-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .dialogue-box {
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .message-a {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message-b {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .webgpu-status {
            background: linear-gradient(90deg, #00f260, #0575e6);
            background-size: 200% 200%;
            animation: gradient 3s ease infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }
        
        .glow-effect {
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        
        .textarea-focus:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-white">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 bg-clip-text text-transparent">
                ShadowPlay
            </h1>
            <p class="text-gray-400 text-lg">人格复刻与思想对撞沙盒 - 基于 WebGPU 的本地隐私计算</p>
            
            <div class="mt-4 flex justify-center items-center gap-4">
                <div id="webgpu-status" class="flex items-center gap-2 px-4 py-2 rounded-full text-sm">
                    <span id="webgpu-indicator" class="w-3 h-3 rounded-full bg-gray-500"></span>
                    <span id="webgpu-text">WebGPU 检测中...</span>
                </div>
                <div id="api-status" class="flex items-center gap-2 px-4 py-2 rounded-full text-sm">
                    <span id="api-indicator" class="w-3 h-3 rounded-full bg-gray-500"></span>
                    <span id="api-text">API 连接中...</span>
                </div>
            </div>
        </header>

        <section id="setup-section" class="mb-8">
            <h2 class="text-2xl font-semibold mb-6 text-center text-gray-200">Step 1: 创建人格影子</h2>
            
            <div class="grid md:grid-cols-2 gap-6">
                <div class="character-card rounded-2xl p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center font-bold text-lg">
                            A
                        </div>
                        <div class="flex-1">
                            <input type="text" id="char-a-name" placeholder="人物A名称 (可选)" 
                                class="w-full bg-gray-800/50 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition">
                        </div>
                    </div>
                    
                    <textarea id="char-a-text" rows="8" placeholder="粘贴人物A的文本描述...&#10;&#10;例如：&#10;他是一个勇敢而聪明的探险家，总是充满热情地探索未知的世界。他善良、温柔，对朋友非常忠诚。在面对困难时，他从不退缩，总是乐观地寻找解决办法。他常说：'冒险才是生活的真谛啊！让我们一起去探索吧！'"
                        class="w-full bg-gray-800/50 border border-gray-600 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition textarea-focus resize-none"></textarea>
                    
                    <div class="mt-4 flex gap-3">
                        <button onclick="analyzeCharacter('A')" 
                            class="flex-1 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-medium py-3 px-6 rounded-xl transition transform hover:scale-105 active:scale-95">
                            分析人格 A
                        </button>
                    </div>
                    
                    <div id="char-a-profile" class="mt-4 hidden">
                        <div class="bg-gray-800/30 rounded-lg p-4">
                            <h4 class="text-sm font-medium text-purple-400 mb-2">分析结果</h4>
                            <div id="char-a-keywords" class="flex flex-wrap gap-2 mb-2"></div>
                            <div id="char-a-traits" class="flex flex-wrap gap-2 mb-2"></div>
                            <div id="char-a-emotions" class="text-xs text-gray-400"></div>
                        </div>
                    </div>
                </div>

                <div class="character-card rounded-2xl p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-pink-500 to-red-600 flex items-center justify-center font-bold text-lg">
                            B
                        </div>
                        <div class="flex-1">
                            <input type="text" id="char-b-name" placeholder="人物B名称 (可选)" 
                                class="w-full bg-gray-800/50 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-pink-500 transition">
                        </div>
                    </div>
                    
                    <textarea id="char-b-text" rows="8" placeholder="粘贴人物B的文本描述...&#10;&#10;例如：&#10;她是一个内向而深思熟虑的哲学家，总是在思考生命的意义。她聪明、理性，对待问题非常认真。她说话时总是带着淡淡的忧伤，喜欢用'呢'、'吧'等温和的语气助词。她常说：'真正的智慧在于认识到自己的无知呢。让我们慢慢思考吧。'"
                        class="w-full bg-gray-800/50 border border-gray-600 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-pink-500 transition textarea-focus resize-none"></textarea>
                    
                    <div class="mt-4 flex gap-3">
                        <button onclick="analyzeCharacter('B')" 
                            class="flex-1 bg-gradient-to-r from-pink-600 to-red-600 hover:from-pink-700 hover:to-red-700 text-white font-medium py-3 px-6 rounded-xl transition transform hover:scale-105 active:scale-95">
                            分析人格 B
                        </button>
                    </div>
                    
                    <div id="char-b-profile" class="mt-4 hidden">
                        <div class="bg-gray-800/30 rounded-lg p-4">
                            <h4 class="text-sm font-medium text-pink-400 mb-2">分析结果</h4>
                            <div id="char-b-keywords" class="flex flex-wrap gap-2 mb-2"></div>
                            <div id="char-b-traits" class="flex flex-wrap gap-2 mb-2"></div>
                            <div id="char-b-emotions" class="text-xs text-gray-400"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-8 flex justify-center gap-4">
            <button onclick="startDialogue()" id="start-btn" 
                class="bg-gradient-to-r from-green-600 to-teal-600 hover:from-green-700 hover:to-teal-700 disabled:from-gray-600 disabled:to-gray-700 text-white font-bold py-3 px-8 rounded-full text-lg transition transform hover:scale-105 active:scale-95 disabled:cursor-not-allowed glow-effect"
                disabled>
                🚀 开始对话
            </button>
            <button onclick="pauseDialogue()" id="pause-btn" 
                class="bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-700 hover:to-orange-700 disabled:from-gray-600 disabled:to-gray-700 text-white font-bold py-3 px-8 rounded-full text-lg transition transform hover:scale-105 active:scale-95 disabled:cursor-not-allowed"
                disabled>
                ⏸️ 暂停
            </button>
            <button onclick="clearDialogue()" 
                class="bg-gradient-to-r from-gray-600 to-gray-700 hover:from-gray-700 hover:to-gray-800 text-white font-bold py-3 px-8 rounded-full text-lg transition transform hover:scale-105 active:scale-95">
                🗑️ 清空
            </button>
        </section>

        <section class="settings-section mb-8">
            <div class="bg-gray-800/30 rounded-xl p-4">
                <h3 class="text-lg font-medium mb-4 text-gray-300">对话设置</h3>
                <div class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">对话轮数</label>
                        <select id="rounds-select" class="w-full bg-gray-700/50 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                            <option value="5">5 轮对话</option>
                            <option value="10" selected>10 轮对话</option>
                            <option value="20">20 轮对话</option>
                            <option value="0">无限对话</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">对话间隔 (秒)</label>
                        <select id="interval-select" class="w-full bg-gray-700/50 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                            <option value="1">1 秒</option>
                            <option value="2" selected>2 秒</option>
                            <option value="3">3 秒</option>
                            <option value="5">5 秒</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">先手</label>
                        <select id="starter-select" class="w-full bg-gray-700/50 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                            <option value="A" selected>人物 A 先手</option>
                            <option value="B">人物 B 先手</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section id="dialogue-section" class="mb-8">
            <h2 class="text-2xl font-semibold mb-6 text-center text-gray-200">Step 2: 思想对撞</h2>
            
            <div class="grid md:grid-cols-2 gap-6">
                <div class="dialogue-box rounded-2xl p-4 h-[500px] flex flex-col">
                    <div class="flex items-center gap-3 mb-4 pb-3 border-b border-gray-700">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center font-bold text-sm">
                            A
                        </div>
                        <span id="char-a-display-name" class="font-medium text-gray-300">人物 A</span>
                        <span id="char-a-speaking" class="ml-auto text-xs text-blue-400 hidden">正在说话...</span>
                    </div>
                    
                    <div id="dialogue-a-messages" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                    </div>
                </div>

                <div class="dialogue-box rounded-2xl p-4 h-[500px] flex flex-col">
                    <div class="flex items-center gap-3 mb-4 pb-3 border-b border-gray-700">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-r from-pink-500 to-red-600 flex items-center justify-center font-bold text-sm">
                            B
                        </div>
                        <span id="char-b-display-name" class="font-medium text-gray-300">人物 B</span>
                        <span id="char-b-speaking" class="ml-auto text-xs text-pink-400 hidden">正在说话...</span>
                    </div>
                    
                    <div id="dialogue-b-messages" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                    </div>
                </div>
            </div>
            
            <div class="mt-4 text-center">
                <p id="dialogue-status" class="text-gray-400 text-sm">等待开始对话...</p>
            </div>
        </section>

        <footer class="text-center py-6 text-gray-500 text-sm">
            <p>ShadowPlay v1.0.0 - 完全本地隐私计算 · WebGPU 加速</p>
            <p class="mt-2">所有数据仅在本地处理，不会上传到任何服务器</p>
        </footer>
    </div>

    <script>
        const API_BASE = '';
        
        let characterProfiles = {
            A: null,
            B: null
        };
        
        let dialogueState = {
            isRunning: false,
            isPaused: false,
            currentSpeaker: 'A',
            roundCount: 0,
            maxRounds: 10,
            lastMessage: null,
            timer: null
        };
        
        async function checkWebGPU() {
            const indicator = document.getElementById('webgpu-indicator');
            const text = document.getElementById('webgpu-text');
            const statusDiv = document.getElementById('webgpu-status');
            
            if ('gpu' in navigator) {
                try {
                    const adapter = await navigator.gpu.requestAdapter();
                    if (adapter) {
                        const device = await adapter.requestDevice();
                        indicator.className = 'w-3 h-3 rounded-full bg-green-500';
                        text.textContent = 'WebGPU 已就绪';
                        statusDiv.className = 'flex items-center gap-2 px-4 py-2 rounded-full text-sm webgpu-status';
                        return;
                    }
                } catch (e) {
                    console.log('WebGPU not available:', e);
                }
            }
            
            indicator.className = 'w-3 h-3 rounded-full bg-yellow-500';
            text.textContent = 'WebGPU 不可用 (使用 CPU)';
            statusDiv.className = 'flex items-center gap-2 px-4 py-2 rounded-full text-sm bg-yellow-900/30';
        }
        
        async function checkAPI() {
            const indicator = document.getElementById('api-indicator');
            const text = document.getElementById('api-text');
            
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                if (response.ok) {
                    indicator.className = 'w-3 h-3 rounded-full bg-green-500';
                    text.textContent = 'API 已连接';
                    return true;
                }
            } catch (e) {
                console.log('API check failed:', e);
            }
            
            indicator.className = 'w-3 h-3 rounded-full bg-red-500';
            text.textContent = 'API 连接失败';
            return false;
        }
        
        async function analyzeCharacter(charId) {
            const nameInput = document.getElementById(`char-${charId.toLowerCase()}-name`);
            const textInput = document.getElementById(`char-${charId.toLowerCase()}-text`);
            const profileDiv = document.getElementById(`char-${charId}-profile`);
            
            const text = textInput.value.trim();
            if (text.length < 10) {
                alert('请输入至少10个字符的文本描述');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        name: nameInput.value.trim() || null
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '分析失败');
                }
                
                const profile = await response.json();
                characterProfiles[charId] = profile;
                
                displayProfile(charId, profile);
                profileDiv.classList.remove('hidden');
                
                document.getElementById(`char-${charId.toLowerCase()}-display-name`).textContent = 
                    profile.name || `人物 ${charId}`;
                
                checkReadyToStart();
                
            } catch (error) {
                alert(`分析失败: ${error.message}`);
                console.error(error);
            }
        }
        
        function displayProfile(charId, profile) {
            const keywordsDiv = document.getElementById(`char-${charId}-keywords`);
            const traitsDiv = document.getElementById(`char-${charId}-traits`);
            const emotionsDiv = document.getElementById(`char-${charId}-emotions`);
            
            keywordsDiv.innerHTML = profile.keywords.slice(0, 8).map(keyword => 
                `<span class="px-2 py-1 bg-purple-900/50 text-purple-300 text-xs rounded-full">${keyword}</span>`
            ).join('');
            
            if (profile.keywords.length === 0) {
                keywordsDiv.innerHTML = '<span class="text-xs text-gray-500">未提取到关键词</span>';
            }
            
            traitsDiv.innerHTML = profile.traits.map(trait => 
                `<span class="px-2 py-1 bg-pink-900/50 text-pink-300 text-xs rounded-full">${trait}</span>`
            ).join('');
            
            if (profile.traits.length === 0) {
                traitsDiv.innerHTML = '<span class="text-xs text-gray-500">未识别到性格特质</span>';
            }
            
            const emotionText = `情感倾向: 积极 ${(profile.emotion_tones.positive * 100).toFixed(0)}% | 消极 ${(profile.emotion_tones.negative * 100).toFixed(0)}% | 中性 ${(profile.emotion_tones.neutral * 100).toFixed(0)}%`;
            emotionsDiv.textContent = emotionText;
        }
        
        function checkReadyToStart() {
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = !(characterProfiles.A && characterProfiles.B);
        }
        
        function startDialogue() {
            if (!characterProfiles.A || !characterProfiles.B) {
                alert('请先分析两个人物的人格');
                return;
            }
            
            dialogueState.maxRounds = parseInt(document.getElementById('rounds-select').value);
            dialogueState.currentSpeaker = document.getElementById('starter-select').value;
            dialogueState.roundCount = 0;
            dialogueState.lastMessage = null;
            dialogueState.isRunning = true;
            dialogueState.isPaused = false;
            
            document.getElementById('start-btn').disabled = true;
            document.getElementById('pause-btn').disabled = false;
            
            updateDialogueStatus('对话进行中...');
            
            runDialogueTurn();
        }
        
        function pauseDialogue() {
            dialogueState.isPaused = !dialogueState.isPaused;
            const pauseBtn = document.getElementById('pause-btn');
            
            if (dialogueState.isPaused) {
                pauseBtn.textContent = '▶️ 继续';
                updateDialogueStatus('对话已暂停');
            } else {
                pauseBtn.textContent = '⏸️ 暂停';
                updateDialogueStatus('对话进行中...');
                runDialogueTurn();
            }
        }
        
        function clearDialogue() {
            dialogueState.isRunning = false;
            dialogueState.isPaused = false;
            dialogueState.roundCount = 0;
            
            if (dialogueState.timer) {
                clearTimeout(dialogueState.timer);
                dialogueState.timer = null;
            }
            
            document.getElementById('dialogue-a-messages').innerHTML = '';
            document.getElementById('dialogue-b-messages').innerHTML = '';
            document.getElementById('start-btn').disabled = !(characterProfiles.A && characterProfiles.B);
            document.getElementById('pause-btn').disabled = true;
            document.getElementById('pause-btn').textContent = '⏸️ 暂停';
            
            updateDialogueStatus('对话已清空，请重新开始');
        }
        
        async function runDialogueTurn() {
            if (!dialogueState.isRunning || dialogueState.isPaused) {
                return;
            }
            
            if (dialogueState.maxRounds > 0 && dialogueState.roundCount >= dialogueState.maxRounds) {
                endDialogue();
                return;
            }
            
            const speaker = dialogueState.currentSpeaker;
            const listener = speaker === 'A' ? 'B' : 'A';
            
            document.getElementById(`char-${speaker.toLowerCase()}-speaking`).classList.remove('hidden');
            
            try {
                const response = await fetch(`${API_BASE}/api/dialogue`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        character_a_profile: characterProfiles.A,
                        character_b_profile: characterProfiles.B,
                        last_message: dialogueState.lastMessage,
                        speaker: speaker
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '对话生成失败');
                }
                
                const result = await response.json();
                
                addMessage(speaker, result.message);
                
                dialogueState.lastMessage = result.message;
                dialogueState.currentSpeaker = listener;
                dialogueState.roundCount++;
                
            } catch (error) {
                console.error('Dialogue error:', error);
                addMessage(speaker, `[错误] ${error.message}`);
            }
            
            document.getElementById(`char-${speaker.toLowerCase()}-speaking`).classList.add('hidden');
            
            const interval = parseInt(document.getElementById('interval-select').value) * 1000;
            
            if (dialogueState.isRunning && !dialogueState.isPaused) {
                dialogueState.timer = setTimeout(runDialogueTurn, interval);
            }
        }
        
        function addMessage(speaker, message) {
            const messagesDiv = document.getElementById(`dialogue-${speaker.toLowerCase()}-messages`);
            const otherDiv = document.getElementById(`dialogue-${speaker === 'A' ? 'b' : 'a'}-messages`);
            
            const messageBubble = document.createElement('div');
            messageBubble.className = `message-appear p-3 rounded-xl ${speaker === 'A' ? 'message-a' : 'message-b'} text-white text-sm max-w-[85%] ${speaker === 'A' ? 'mr-auto' : 'ml-auto'}`;
            messageBubble.textContent = message;
            
            const systemMessage = document.createElement('div');
            systemMessage.className = 'text-center text-xs text-gray-500 py-1';
            systemMessage.textContent = `第 ${dialogueState.roundCount + 1} 轮 - 人物 ${speaker}`;
            
            messagesDiv.appendChild(systemMessage);
            messagesDiv.appendChild(messageBubble);
            
            const placeholder = document.createElement('div');
            placeholder.className = 'text-center text-xs text-gray-600 py-4 italic';
            placeholder.textContent = '等待对方回应...';
            otherDiv.appendChild(placeholder);
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            otherDiv.scrollTop = otherDiv.scrollHeight;
            
            updateDialogueStatus(`第 ${dialogueState.roundCount + 1} 轮对话进行中...`);
        }
        
        function endDialogue() {
            dialogueState.isRunning = false;
            dialogueState.isPaused = false;
            
            if (dialogueState.timer) {
                clearTimeout(dialogueState.timer);
                dialogueState.timer = null;
            }
            
            document.getElementById('start-btn').disabled = false;
            document.getElementById('pause-btn').disabled = true;
            document.getElementById('pause-btn').textContent = '⏸️ 暂停';
            
            updateDialogueStatus(`对话完成！共进行了 ${dialogueState.roundCount} 轮对话`);
        }
        
        function updateDialogueStatus(text) {
            document.getElementById('dialogue-status').textContent = text;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            checkWebGPU();
            checkAPI();
        });
    </script>
</body>
</html>
